<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>School AI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

  <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow">

    <h1 class="text-2xl font-bold mb-4">📚 Gerador de Aula com IA</h1>

    <input id="subject" placeholder="Matéria" class="w-full p-2 mb-2 border rounded">
    <input id="grade" placeholder="Série" class="w-full p-2 mb-2 border rounded">
    <input id="level" placeholder="Nível" class="w-full p-2 mb-2 border rounded">
    <input id="topic" placeholder="Tema" class="w-full p-2 mb-2 border rounded">
    <input id="subtopics" placeholder="Subtópicos" class="w-full p-2 mb-4 border rounded">

    <button onclick="generateLesson()" class="bg-blue-600 text-white px-4 py-2 rounded">
      Gerar Aula
    </button>

    <div id="result" class="mt-6 whitespace-pre-wrap"></div>

  </div>

  <script src="app.js"></script>

</body>
</html>
